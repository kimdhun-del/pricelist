<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetGear Pro — 네트워크 장비 가격표</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#070b10; --surface:#0d1420; --border:#1a2535; --border2:#243046;
    --accent:#00d4ff; --accent3:#00ff9d; --text:#e8f0fe; --muted:#6b7fa3;
    --tag-bg:rgba(0,212,255,.08); --row-hover:rgba(0,212,255,.04);
    --glow:0 0 30px rgba(0,212,255,.15);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 80px}
  header{padding:56px 0 48px;display:flex;flex-direction:column;gap:12px}
  .badge{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--tag-bg);border:1px solid rgba(0,212,255,.2);padding:6px 14px;border-radius:100px;width:fit-content}
  .badge::before{content:'●';font-size:8px;animation:blink 1.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.6rem);font-weight:800;line-height:1.1;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{font-size:14px;color:var(--muted);letter-spacing:.02em;font-weight:300}
  .stats{display:flex;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:32px;background:var(--surface)}
  .stat{flex:1;padding:20px 24px;border-right:1px solid var(--border);transition:background .2s}
  .stat:last-child{border-right:none}
  .stat:hover{background:var(--row-hover)}
  .stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
  .stat-v{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent)}
  .controls{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
  .row1{display:flex;gap:12px;align-items:center}
  .row2{display:flex;gap:8px;flex-wrap:wrap;align-items:center;min-height:38px}
  .swrap{flex:1;position:relative}
  .swrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .swrap input{width:100%;padding:11px 14px 11px 40px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
  .swrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
  .swrap input::placeholder{color:var(--muted)}
  .fbtn{padding:8px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.05em}
  .fbtn:hover,.fbtn.on{border-color:var(--accent);color:var(--accent);background:var(--tag-bg)}
  .twrap{border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--glow)}
  table{width:100%;border-collapse:collapse}
  thead tr{background:linear-gradient(135deg,#0d1a2e,#111e30);border-bottom:1px solid var(--border2)}
  thead th{padding:16px 20px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none;transition:color .2s}
  thead th:hover{color:var(--accent)}
  thead th .si{margin-left:6px;opacity:.4;font-size:10px}
  thead th.sorted{color:var(--accent)}
  thead th.sorted .si{opacity:1}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s;animation:fadeIn .3s ease both}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--row-hover)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  td{padding:16px 20px;font-size:14px;vertical-align:middle}
  .cnum{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);width:48px}
  .cmodel{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:14px}
  .cprice{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--accent3);text-align:right;white-space:nowrap}
  .cstat{text-align:center}
  .tag{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;border:1px solid}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%}
  .don{background:var(--accent3);box-shadow:0 0 8px var(--accent3)}
  .dlow{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.6)}
  .doff{background:#f87171;box-shadow:0 0 8px rgba(248,113,113,.5)}
  .nores td{text-align:center;padding:48px;color:var(--muted);font-size:13px;font-family:'JetBrains Mono',monospace}
  #loading{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s}
  #loading.hide{opacity:0;pointer-events:none}
  .spin{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .ltxt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.1em}
  .fnote{margin-top:28px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .fnote::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2))}
  @media(max-width:640px){.stats{flex-direction:column}.stat{border-right:none;border-bottom:1px solid var(--border)}.stat:last-child{border-bottom:none}}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><div class="ltxt">데이터 불러오는 중...</div></div>
<div class="wrap">
  <header>
    <div class="badge">Live Pricing</div>
    <h1>Network Equipment<br>Price List</h1>
    <p class="subtitle">네트워크 장비 공급가 목록 — 모델명 / 가격 실시간 관리</p>
  </header>
  <div class="stats">
    <div class="stat"><div class="stat-l">Total Items</div><div class="stat-v" id="s-total">—</div></div>
    <div class="stat"><div class="stat-l">In Stock</div><div class="stat-v" id="s-stock">—</div></div>
    <div class="stat"><div class="stat-l">Categories</div><div class="stat-v" id="s-cats">—</div></div>
  </div>
  <div class="controls">
    <div class="row1">
      <div class="swrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="모델명 검색...">
      </div>
    </div>
    <div class="row2" id="frow"></div>
  </div>
  <div class="twrap">
    <table>
      <thead><tr>
        <th class="cnum">#</th>
        <th data-sort="model">MODEL <span class="si">↕</span></th>
        <th data-sort="cat">카테고리 <span class="si">↕</span></th>
        <th data-sort="status">재고 <span class="si">↕</span></th>
        <th data-sort="price" style="text-align:right">가격 (VAT포함) <span class="si">↕</span></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="fnote">마지막 업데이트: <span id="lupd">—</span> · 가격은 VAT 포함 공급가 기준</div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLtR1pQsnrl4AJIsy1xkOu68l_jVbAo64",
  authDomain: "pricelist-61f5f.firebaseapp.com",
  projectId: "pricelist-61f5f",
  storageBucket: "pricelist-61f5f.firebasestorage.app",
  messagingSenderId: "1012022631154",
  appId: "1:1012022631154:web:0fb466191ed26c2f2b4e6b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const DEF_CATS = ['스위치','라우터','AP','방화벽','서버','케이블/기타'];
const DEF_DATA = [
  {id:1,model:'Cisco C9200L-24T-4G',cat:'스위치',price:1250000,status:'재고있음'},
  {id:2,model:'Cisco C9200L-48T-4G',cat:'스위치',price:2100000,status:'재고있음'},
  {id:3,model:'Cisco ISR 4331',cat:'라우터',price:3450000,status:'소량재고'},
  {id:4,model:'Cisco ISR 4351',cat:'라우터',price:5200000,status:'재고있음'},
  {id:5,model:'Cisco Catalyst 9120',cat:'AP',price:680000,status:'재고있음'},
  {id:6,model:'Ubiquiti UAP-AC-PRO',cat:'AP',price:245000,status:'재고있음'},
  {id:7,model:'Fortinet FG-60F',cat:'방화벽',price:1890000,status:'소량재고'},
  {id:8,model:'Fortinet FG-100F',cat:'방화벽',price:4350000,status:'재고있음'},
  {id:9,model:'Palo Alto PA-220',cat:'방화벽',price:2750000,status:'품절'},
  {id:10,model:'Dell EMC R350',cat:'서버',price:4980000,status:'재고있음'},
  {id:11,model:'HP ProLiant DL360 G10',cat:'서버',price:7200000,status:'소량재고'},
  {id:12,model:'AMP CAT6A UTP 305M',cat:'케이블/기타',price:98000,status:'재고있음'},
];
const PAL=[
  {c:'#00d4ff',b:'rgba(0,212,255,.3)',g:'rgba(0,212,255,.07)'},
  {c:'#a78bfa',b:'rgba(167,139,250,.3)',g:'rgba(167,139,250,.07)'},
  {c:'#fb923c',b:'rgba(251,146,60,.3)',g:'rgba(251,146,60,.07)'},
  {c:'#f472b6',b:'rgba(244,114,182,.3)',g:'rgba(244,114,182,.07)'},
  {c:'#34d399',b:'rgba(52,211,153,.3)',g:'rgba(52,211,153,.07)'},
  {c:'#fbbf24',b:'rgba(251,191,36,.3)',g:'rgba(251,191,36,.07)'},
  {c:'#60a5fa',b:'rgba(96,165,250,.3)',g:'rgba(96,165,250,.07)'},
  {c:'#f87171',b:'rgba(248,113,113,.3)',g:'rgba(248,113,113,.07)'},
];
const DMAP={재고있음:'don',소량재고:'dlow',품절:'doff'};
let DATA=[],CATS=[],sortCol=null,sortDir=1,filterCat='all';
const fmt=n=>n.toLocaleString('ko-KR')+' 원';
const palOf=c=>PAL[(CATS.indexOf(c)<0?0:CATS.indexOf(c))%PAL.length];

function renderFilters(){
  const row=document.getElementById('frow');row.innerHTML='';
  const mk=(label,val)=>{const b=document.createElement('button');b.className='fbtn'+(filterCat===val?' on':'');b.textContent=label;b.onclick=()=>{filterCat=val;renderFilters();render();};row.appendChild(b);};
  mk('ALL','all');CATS.forEach(c=>mk(c,c));
}
function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let rows=DATA.filter(d=>(filterCat==='all'||d.cat===filterCat)&&(!q||d.model.toLowerCase().includes(q)));
  if(sortCol){rows=[...rows].sort((a,b)=>{if(sortCol==='price')return(a.price-b.price)*sortDir;const va=sortCol==='cat'?(a.cat||''):(a[sortCol]||'');const vb=sortCol==='cat'?(b.cat||''):(b[sortCol]||'');return va.localeCompare(vb,'ko')*sortDir;});}
  const tb=document.getElementById('tbody');tb.innerHTML='';
  if(!rows.length){tb.innerHTML='<tr class="nores"><td colspan="5">검색 결과가 없어요 🔍</td></tr>';return;}
  rows.forEach((d,i)=>{const p=palOf(d.cat);const tr=document.createElement('tr');tr.style.animationDelay=(i*25)+'ms';
    tr.innerHTML=`<td class="cnum">${String(i+1).padStart(2,'0')}</td><td class="cmodel">${d.model}</td><td><span class="tag" style="color:${p.c};border-color:${p.b};background:${p.g}">${d.cat}</span></td><td class="cstat"><span class="dot ${DMAP[d.status]||'doff'}" title="${d.status}"></span></td><td class="cprice">${fmt(d.price)}</td>`;
    tb.appendChild(tr);});
  document.getElementById('s-total').textContent=DATA.length;
  document.getElementById('s-stock').textContent=DATA.filter(d=>d.status==='재고있음').length;
  document.getElementById('s-cats').textContent=CATS.length;
  document.getElementById('lupd').textContent=new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
document.querySelectorAll('thead th[data-sort]').forEach(th=>{th.onclick=()=>{const col=th.dataset.sort;sortDir=sortCol===col?-sortDir:1;sortCol=col;document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('sorted');if(t.querySelector('.si'))t.querySelector('.si').textContent='↕';});th.classList.add('sorted');th.querySelector('.si').textContent=sortDir===1?'↑':'↓';render();};});
document.getElementById('search').oninput=()=>render();

// Firestore 실시간 구독 — 데이터 변경 시 자동 반영
onSnapshot(doc(db,'pricelist','data'), snap=>{
  if(snap.exists()){
    const d=snap.data();
    DATA=d.items||DEF_DATA;
    CATS=d.cats||DEF_CATS;
  } else {
    DATA=DEF_DATA.map(d=>({...d}));
    CATS=[...DEF_CATS];
  }
  renderFilters();render();
  document.getElementById('loading').classList.add('hide');
});
</script>
</body>
</html>
