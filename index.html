<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네트워크 장비 가격표</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400&family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06090f;
    --surface: #0c1119;
    --surface2: #111827;
    --border: #1c2a3a;
    --border2: #223040;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --text: #e8f0fe;
    --text2: #94a3b8;
    --muted: #4b6080;
    --tag-bg: rgba(0,212,255,.08);
    --row-hover: rgba(0,212,255,.04);
  }

  /* 모든 요소에서 굵은 글씨 해제 및 폰트 크기 통일 */
  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-weight: 400 !important; /* 굵게 설정된 모든 속성 무효화 */
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 14px; /* 기본 글자 크기 통일 */
  }

  /* 격자 배경 */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  /* ─── 탑바 ─── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(6,9,15,.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px,4vw,48px);
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--text); text-decoration: none; }
  .cart-pill {
    display: flex; align-items: center; gap: 7px; padding: 6px 14px;
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px;
    cursor: pointer; font-size: 13px; color: var(--text2); transition: all .2s;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px clamp(16px,3vw,48px) 80px; }

  header { padding-bottom: 30px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 28px; margin-bottom: 8px; color: var(--text); }
  .subtitle { color: var(--muted); font-size: 14px; }

  /* ─── 검색창 및 카테고리 필터 ─── */
  .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
  .swrap input {
    width: 100%; padding: 12px 18px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-size: 14px; outline: none; transition: 0.2s;
  }
  .swrap input:focus { border-color: var(--accent); }

  .cat-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .fbtn {
    padding: 6px 14px; background: var(--surface); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text2); font-size: 13px; cursor: pointer; transition: 0.2s;
  }
  .fbtn.on { background: var(--tag-bg); border-color: var(--accent); color: var(--accent); }

  /* ─── 테이블 가로 간격 교정 ─── */
  .twrap { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead tr { background: #0d141f; border-bottom: 1px solid var(--border2); }
  thead th {
    padding: 14px 18px; text-align: left; font-size: 12px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
  }

  /* 컬럼 비율 고정 */
  .cnum   { width: 50px; text-align: center; }
  .cmodel { width: auto; }
  .cprice { width: 180px; text-align: right; }
  .ccat   { width: 140px; text-align: center; }
  .cact   { width: 110px; text-align: right; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--row-hover); }
  td { padding: 12px 18px; font-size: 14px; vertical-align: middle; }

  .cmodel { white-space: normal; word-break: break-all; line-height: 1.5; color: var(--text); }
  .cprice { color: var(--accent2); font-family: 'JetBrains Mono', monospace; }
  
  .tag { 
    display: inline-block; padding: 2px 10px; border-radius: 4px; 
    font-size: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.1);
  }

  .add-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 6px 12px; width: 80px; background: transparent; border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-btn.added { border-color: var(--accent2); color: var(--accent2); }

  /* 로딩 애니메이션 */
  #loading { position: fixed; inset: 0; background: var(--bg); z-index: 400; display: flex; align-items: center; justify-content: center; }
  #loading.hide { opacity: 0; pointer-events: none; transition: 0.4s; }
  .spin { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }

  /* 모바일 대응 */
  @media (max-width: 768px) {
    .ccat { display: none; }
    .cprice { width: 130px; }
  }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div></div>

<header class="topbar">
  <a href="#" class="logo">NETWORK PRICE</a>
  <button class="cart-pill" id="cart-pill-btn" onclick="openCart()">
    장바구니 <span id="cart-badge" style="margin-left:5px; color:var(--accent); display:none">0</span>
  </button>
</header>

<div class="wrap">
  <header>
    <h1>Network Price List</h1>
    <p class="subtitle">실시간 브랜드별 공급가 목록 (VAT 포함)</p>
  </header>

  <div class="controls">
    <div class="swrap">
      <input type="text" id="search" placeholder="모델명 검색...">
    </div>
    <!-- 카테고리 필터 버튼 영역 -->
    <div class="cat-row" id="cat-row">
      <button class="fbtn on" onclick="window.setFilter('all')">전체</button>
    </div>
  </div>

  <div class="twrap">
    <table>
      <thead>
        <tr>
          <th class="cnum">#</th>
          <th class="cmodel">MODEL</th>
          <th class="cprice">가격 (VAT포함)</th>
          <th class="ccat">카테고리</th>
          <th class="cact">주문</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- 사이드 패널 및 Firebase 스크립트 생략 (기존 기능 유지) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLtR1pQsnrl4AJIsy1xkOu68l_jVbAo64",
  authDomain: "pricelist-61f5f.firebaseapp.com",
  projectId: "pricelist-61f5f",
  storageBucket: "pricelist-61f5f.firebasestorage.app",
  messagingSenderId: "1012022631154",
  appId: "1:1012022631154:web:0fb466191ed26c2f2b4e6b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let DATA = [];
let CART = [];
let CURRENT_FILTER = 'all';

function render() {
  const tb = document.getElementById('tbody');
  const q = document.getElementById('search').value.toLowerCase();
  
  const filtered = DATA.filter(d => {
    const matchSearch = d.model.toLowerCase().includes(q);
    const matchCat = CURRENT_FILTER === 'all' || d.cat === CURRENT_FILTER;
    return matchSearch && matchCat;
  });

  tb.innerHTML = filtered.map((d, i) => {
    const isAdded = CART.some(c => c.id === d.id);
    return `
      <tr>
        <td class="cnum">${i + 1}</td>
        <td class="cmodel">${d.model}</td>
        <td class="cprice">${Number(d.price).toLocaleString()}원</td>
        <td class="ccat"><span class="tag">${d.cat || '기타'}</span></td>
        <td class="cact">
          <button class="add-btn ${isAdded ? 'added' : ''}" onclick="window.toggleCart(${d.id})">
            ${isAdded ? '담김' : '+ 담기'}
          </button>
        </td>
      </tr>`;
  }).join('');
}

function updateCategoryButtons() {
  const catRow = document.getElementById('cat-row');
  const cats = ['all', ...new Set(DATA.map(d => d.cat).filter(Boolean))];
  catRow.innerHTML = cats.map(cat => `
    <button class="fbtn ${CURRENT_FILTER === cat ? 'on' : ''}" onclick="window.setFilter('${cat}')">
      ${cat === 'all' ? '전체' : cat}
    </button>
  `).join('');
}

window.setFilter = (cat) => {
  CURRENT_FILTER = cat;
  updateCategoryButtons();
  render();
};

window.toggleCart = (id) => {
  const idx = CART.findIndex(c => c.id === id);
  if(idx > -1) CART.splice(idx, 1);
  else CART.push(DATA.find(d => d.id === id));
  
  const badge = document.getElementById('cart-badge');
  badge.textContent = CART.length;
  badge.style.display = CART.length > 0 ? 'inline' : 'none';
  render();
};

onSnapshot(doc(db, 'pricelist', 'data'), snap => {
  if (snap.exists()) {
    DATA = snap.data().items || [];
    updateCategoryButtons();
    render();
  }
  document.getElementById('loading').classList.add('hide');
});

document.getElementById('search').oninput = render;
</script>
</body>
</html>
