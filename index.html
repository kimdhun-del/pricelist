<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네트워크 장비 가격표 & 주문</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #06090f;
    --surface: #0c1119;
    --surface2: #111827;
    --border: #1c2a3a;
    --border2: #223040;
    --accent: #00d4ff;
    --accent-glow: rgba(0,212,255,.25);
    --accent2: #00ff9d;
    --accent3: #3b82f6;
    --gold: #f59e0b;
    --text: #e8f0fe;
    --text2: #94a3b8;
    --muted: #4b6080;
    --danger: #ef4444;
    --success: #10b981;
    --tag-bg: rgba(0,212,255,.08);
    --row-hover: rgba(0,212,255,.04);
    --card-glow: 0 0 30px rgba(0,212,255,.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  /* ─── 탑바 ─── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(6,9,15,.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px,4vw,48px);
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); text-decoration: none; }
  .cart-pill {
    display: flex; align-items: center; gap: 7px; padding: 8px 16px;
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text2); transition: all .2s; position: relative;
  }
  .cart-pill.has-items { border-color: var(--gold); color: var(--gold); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px; background: var(--gold); color: #000; border-radius: 100px;
    font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 clamp(16px,3vw,48px) 80px; }

  header { padding: 48px 0 32px; display: flex; flex-direction: column; gap: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--accent); background: var(--tag-bg); border: 1px solid rgba(0,212,255,.2); padding: 6px 14px; border-radius: 100px; width: fit-content;
  }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3.6rem); font-weight: 800; line-height: 1.1; letter-spacing: -.02em; background: linear-gradient(135deg, #fff 30%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 14px; color: var(--muted); font-weight: 300; }

  /* ─── 통계 ─── */
  .stats { display: flex; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 32px; background: var(--surface); }
  .stat { flex: 1; padding: 20px 24px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-l { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
  .stat-v { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); }

  /* ─── 검색 ─── */
  .controls { margin-bottom: 24px; }
  .swrap input {
    width: 100%; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px;
    color: var(--text); font-size: 15px; outline: none; transition: border-color .2s;
  }
  .swrap input:focus { border-color: var(--accent); }

  /* ─── 테이블 정밀 교정 ─── */
  .twrap { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--card-glow); background: var(--surface); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead tr { background: #0d141f; border-bottom: 1px solid var(--border2); }
  thead th {
    padding: 16px 20px; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
  }

  /* 컬럼 너비 지정 */
  .cnum   { width: 60px; text-align: center; }
  .cmodel { width: auto; text-align: left; }
  .cprice { width: 200px; text-align: right; }
  .ccat   { width: 150px; text-align: center; }
  .cact   { width: 120px; text-align: right; }

  /* 가로 줄간격(행 높이) 조정 */
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: var(--row-hover); }
  td { padding: 14px 20px; font-size: 14px; vertical-align: middle; } /* 18px -> 14px로 줄여서 더 촘촘하게 */

  .cmodel { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); white-space: normal; word-break: break-all; line-height: 1.4; }
  .cprice { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent2); font-size: 16px; }

  .tag { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-family: 'Noto Sans KR', sans-serif; border: 1px solid; }

  .add-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px 12px; width: 85px; background: rgba(0,212,255,.05); border: 1px solid rgba(0,212,255,0.3); border-radius: 8px;
    color: var(--accent); font-family: 'Noto Sans KR', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer; transition: all .2s;
  }
  .add-btn:hover { background: var(--accent); color: #000; }
  .add-btn.added { background: rgba(16,185,129,.1); border-color: var(--success); color: var(--success); width: auto; }

  /* ─── 사이드 패널 (복구) ─── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 100; }
  .overlay.open { display: block; }
  .cart-panel {
    position: fixed; top: 0; right: 0; width: min(480px, 100vw); height: 100%; height: 100dvh;
    background: var(--surface); border-left: 1px solid var(--border2); z-index: 101;
    display: flex; flex-direction: column; transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .cart-panel.open { transform: translateX(0); }
  .panel-head { padding: 20px; border-bottom: 1px solid var(--border2); display: flex; justify-content: space-between; align-items: center; }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; }
  .panel-footer { padding: 20px; border-top: 1px solid var(--border2); background: var(--surface); }

  /* 주문 폼 스타일 */
  .order-form { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
  .field input, .field textarea {
    width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); outline: none;
  }
  .submit-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px; color: #000; font-weight: 700; cursor: pointer;
  }

  #loading { position: fixed; inset: 0; background: var(--bg); z-index: 400; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  #loading.hide { opacity: 0; pointer-events: none; transition: 0.5s; }
  .spin { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div class="ltxt">데이터 동기화 중...</div></div>

<header class="topbar">
  <div class="logo">NETWORK PRO</div>
  <button class="cart-pill" id="cart-pill-btn" onclick="openCart()">
    장바구니 <span class="cart-badge" id="cart-badge" style="display:none">0</span>
  </button>
</header>

<div class="wrap">
  <header>
    <div class="badge">Live Pricing</div>
    <h1 id="site-title">Network Equipment<br>Price List</h1>
    <p class="subtitle">실시간 재고 및 VAT 포함 공급가 목록</p>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-l">전체 등록 모델</div><div class="stat-v" id="s-total">0</div></div>
    <div class="stat"><div class="stat-l">마지막 업데이트</div><div class="stat-v" id="lupd">--:--</div></div>
  </div>

  <div class="controls">
    <div class="swrap"><input type="text" id="search" placeholder="모델명 검색..."></div>
  </div>

  <div class="twrap">
    <table>
      <thead>
        <tr>
          <th class="cnum">#</th>
          <th class="cmodel">MODEL</th>
          <th class="cprice">가격 (VAT포함)</th>
          <th class="ccat">브랜드/분류</th>
          <th class="cact">주문</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- 장바구니 사이드바 -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="panel-head"><h3>🛒 주문서 작성</h3><button onclick="closeCart()" style="background:none;border:none;color:white;cursor:pointer;font-size:20px">✕</button></div>
  <div class="panel-body">
    <div id="cart-items-wrap">
      <p style="color:var(--muted); text-align:center; padding:40px 0;">장바구니가 비어있습니다.</p>
    </div>
    
    <div class="order-form">
      <div class="field"><label>고객사명</label><input id="f-company" placeholder="(주)회사명"></div>
      <div class="field"><label>담당자 연락처</label><input id="f-contact" placeholder="010-0000-0000"></div>
      <div class="field"><label>메모</label><textarea id="f-memo" rows="3" placeholder="추가 요청사항을 입력하세요"></textarea></div>
    </div>
  </div>
  <div class="panel-footer">
    <button class="submit-btn" onclick="alert('주문 기능은 관리자 설정 후 활성화됩니다.')">주문서 제출하기</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLtR1pQsnrl4AJIsy1xkOu68l_jVbAo64",
  authDomain: "pricelist-61f5f.firebaseapp.com",
  projectId: "pricelist-61f5f",
  storageBucket: "pricelist-61f5f.firebasestorage.app",
  messagingSenderId: "1012022631154",
  appId: "1:1012022631154:web:0fb466191ed26c2f2b4e6b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let DATA = [];
let CART = [];

const CAT_COLORS = {
  '머큐시스': {c:'#00d4ff', b:'rgba(0,212,255,0.3)', g:'rgba(0,212,255,0.05)'},
  '티피링크': {c:'#00ff9d', b:'rgba(0,255,157,0.3)', g:'rgba(0,255,157,0.05)'},
  '아이피타임': {c:'#ff9f43', b:'rgba(255,159,67,0.3)', g:'rgba(255,159,67,0.05)'}
};

function render() {
  const tb = document.getElementById('tbody');
  const q = document.getElementById('search').value.toLowerCase();
  const rows = DATA.filter(d => d.model.toLowerCase().includes(q));
  
  document.getElementById('s-total').textContent = DATA.length;
  document.getElementById('lupd').textContent = new Date().toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit'});

  tb.innerHTML = rows.map((d, i) => {
    const col = CAT_COLORS[d.cat] || {c:'#a78bfa', b:'rgba(167,139,250,0.3)', g:'rgba(167,139,250,0.05)'};
    const isAdded = CART.some(c => c.id === d.id);
    return `
      <tr>
        <td class="cnum">${i + 1}</td>
        <td class="cmodel">${d.model}</td>
        <td class="cprice">${Number(d.price).toLocaleString()}원</td>
        <td class="ccat"><span class="tag" style="color:${col.c};border-color:${col.b};background:${col.g}">${d.cat || '기타'}</span></td>
        <td class="cact">
          <button class="add-btn ${isAdded ? 'added' : ''}" onclick="window.toggleCart(${d.id})">
            ${isAdded ? '✓ 담김' : '+ 담기'}
          </button>
        </td>
      </tr>`;
  }).join('');
}

window.toggleCart = (id) => {
  const idx = CART.findIndex(c => c.id === id);
  if(idx > -1) CART.splice(idx, 1);
  else CART.push(DATA.find(d => d.id === id));
  updateCartUI();
  render();
};

function updateCartUI() {
  const badge = document.getElementById('cart-badge');
  const pill = document.getElementById('cart-pill-btn');
  const wrap = document.getElementById('cart-items-wrap');
  
  badge.textContent = CART.length;
  badge.style.display = CART.length > 0 ? 'flex' : 'none';
  if(CART.length > 0) pill.classList.add('has-items');
  else pill.classList.remove('has-items');

  if(CART.length === 0) {
    wrap.innerHTML = '<p style="color:var(--muted); text-align:center; padding:40px 0;">장바구니가 비어있습니다.</p>';
  } else {
    wrap.innerHTML = CART.map(c => `
      <div style="padding:10px; border-bottom:1px solid var(--border2); display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:13px;">${c.model}</div>
        <button onclick="window.toggleCart(${c.id})" style="background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
      </div>
    `).join('');
  }
}

window.openCart = () => {
  document.getElementById('cart-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
};
window.closeCart = () => {
  document.getElementById('cart-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
};

onSnapshot(doc(db, 'pricelist', 'data'), snap => {
  if (snap.exists()) {
    DATA = snap.data().items || [];
    render();
  }
  document.getElementById('loading').classList.add('hide');
});

document.getElementById('search').oninput = render;
</script>
</body>
</html>
